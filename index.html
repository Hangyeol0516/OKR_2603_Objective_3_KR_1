<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심플 핑퐁 게임</title>
    <style>
        body { background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #fff; background-color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .info { position: absolute; top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="info">
        <h1>PING PONG</h1>
        <p>마우스를 움직여 공을 튕겨내세요!</p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 게임 객체 설정
        const ball = { x: canvas.width/2, y: canvas.height/2, radius: 10, speed: 5, dx: 5, dy: 5 };
        const paddle = { width: 100, height: 15, x: (canvas.width - 100) / 2 };

        // 마우스 이동 감지
        document.addEventListener("mousemove", (e) => {
            const relativeX = e.clientX - canvas.offsetLeft;
            if(relativeX > 0 && relativeX < canvas.width) {
                paddle.x = relativeX - paddle.width / 2;
            }
        });

        function draw() {
            // 배경 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 공 그리기
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fillStyle = "#00FF00";
            ctx.fill();
            ctx.closePath();

            // 패들 그리기
            ctx.beginPath();
            ctx.rect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.closePath();

            // 공 이동 로직
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 벽 충돌 (좌우)
            if(ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx *= -1;
            // 천장 충돌
            if(ball.y - ball.radius < 0) ball.dy *= -1;

            // 패들 충돌
            if(ball.y + ball.radius > canvas.height - paddle.height - 10) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.dy *= -1.05; // 튕길 때마다 속도 증가
                    ball.y = canvas.height - paddle.height - 20;
                } else if(ball.y + ball.radius > canvas.height) {
                    // 게임 오버 시 리셋
                    alert("GAME OVER! 다시 시작합니다.");
                    ball.x = canvas.width/2;
                    ball.y = canvas.height/2;
                    ball.speed = 5;
                    ball.dx = 5;
                    ball.dy = 5;
                }
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
